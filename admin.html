<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <title>Gestão da Loja — Estofkar Dom Elias</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="admin-body">

  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="brand" aria-label="Estofkar Dom Elias">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="28" height="28"><path d="M12 1 L23 12 L12 23 L1 12 Z" fill="none" stroke="#F5B301" stroke-width="2"/><circle cx="12" cy="12" r="2" fill="#F5B301"/></svg>
        </span>
        <span class="brand-text"><strong>Estofkar</strong> <span>Dom Elias</span></span>
      </a>
      <div class="header-right">
        <span class="admin-tag" data-i18n="admin.title">Gestão da Loja</span>
        <div class="lang-switch" role="group" aria-label="Idioma / Idioma">
          <button data-lang="pt">PT</button>
          <button data-lang="es">ES</button>
        </div>
      </div>
    </div>
  </header>

  <main class="container admin-main">

    <!-- LOGIN -->
    <section id="login-view" class="admin-card login-card" hidden>
      <h1 data-i18n="admin.loginTitle">Entrar</h1>
      <form id="login-form">
        <label class="field">
          <span data-i18n="admin.email">Email</span>
          <input type="email" id="login-email" autocomplete="username" required />
        </label>
        <label class="field">
          <span data-i18n="admin.password">Palavra-passe</span>
          <input type="password" id="login-pass" autocomplete="current-password" required />
        </label>
        <p id="login-err" class="admin-msg is-err"></p>
        <button type="submit" class="btn btn-primary btn-lg" style="width:100%" data-i18n="admin.loginBtn">Entrar</button>
      </form>
    </section>

    <!-- APP (depois de entrar) -->
    <section id="app-view" hidden>
      <div class="admin-topbar">
        <h1 data-i18n="admin.title">Gestão da Loja</h1>
        <div style="display:flex; gap:10px;">
          <a class="btn btn-outline btn-sm" href="loja.html" target="_blank" rel="noopener">Loja ↗</a>
          <button id="logout" class="btn btn-sm btn-logout" data-i18n="admin.logout">Sair</button>
        </div>
      </div>

      <div class="admin-grid">
        <!-- Formulário de adicionar -->
        <div class="admin-card">
          <h2 data-i18n="admin.addTitle">Adicionar produto</h2>
          <form id="add-form">
            <label class="field">
              <span data-i18n="admin.fName">Nome do produto</span>
              <input type="text" id="f-name" data-i18n-ph="admin.fNamePh" required />
            </label>
            <div class="field-row">
              <label class="field">
                <span data-i18n="admin.fCategory">Categoria</span>
                <select id="f-category" required></select>
              </label>
              <label class="field">
                <span data-i18n="admin.fPrice">Preço (€)</span>
                <input type="number" id="f-price" min="0" step="1" required />
              </label>
              <label class="field">
                <span data-i18n="admin.fQty">Quantidade</span>
                <input type="number" id="f-qty" min="1" step="1" value="1" />
              </label>
            </div>
            <label class="field">
              <span data-i18n="admin.fDesc">Descrição (opcional)</span>
              <textarea id="f-desc" rows="2" data-i18n-ph="admin.fDescPh"></textarea>
            </label>
            <div class="field">
              <span data-i18n="admin.fPhoto">Foto</span>
              <label class="file-pick">
                <input type="file" id="f-photo" accept="image/*" />
                <span class="file-pick__btn" data-i18n="admin.choosePhoto">📷 Escolher foto</span>
                <span class="file-pick__name" id="f-photo-name" data-i18n="admin.noFile">Nenhuma foto selecionada</span>
              </label>
            </div>
            <p id="admin-msg" class="admin-msg"></p>
            <button type="submit" class="btn btn-primary btn-lg" style="width:100%" data-i18n="admin.save">Guardar produto</button>
          </form>
        </div>

        <!-- Lista de produtos -->
        <div class="admin-card">
          <h2 data-i18n="admin.listTitle">Produtos publicados</h2>
          <div id="admin-list"></div>
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="i18n.js"></script>
  <script src="admin.js"></script>
</body>
</html>
